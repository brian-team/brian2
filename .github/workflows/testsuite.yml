name: TestSuite

on:
  push:
  pull_request:
  # workflow_dispatch lets you trigger the suite from the Actions tab
  # without committing/pushing a code change. Useful for verifying the
  # cppyy-on-Windows workaround on a Windows runner without committing
  # any code yet.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  get_python_versions:
    name: "Determine Python versions"
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      min-python: ${{ steps.nep29.outputs.min-python }}
      max-python: ${{ steps.nep29.outputs.max-python }}
    steps:
      - name: "calculate versions according to SPEC-0"
        id: nep29
        uses: mstimberg/github-calc-nep29@a73481e4e8488a5fa0b3be70a385cc5206a261ba # v0.7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Match SPEC-0
          deprecate-python-after: 36
          min-python-releases: 0

  pre-commit:
    name: Run linters with pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"
      - name: set PY
        run: echo "PY=$(python -VV | sha256sum | cut -d' ' -f1)" >> $GITHUB_ENV
      - uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ env.PY }}|${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install pre-commit
        run: pip3 install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  testing:
    needs: [get_python_versions, pre-commit]
    name: "Python ${{ matrix.python-version }} on ${{ matrix.os.image }} (standalone: ${{ matrix.standalone }}, 32bit: ${{ matrix.float_dtype_32 }})"
    runs-on: ${{ matrix.os.image }}
    strategy:
      fail-fast: false
      matrix:
        os:
          [
            { image: ubuntu-24.04, triplet: x64-linux },
            { image: windows-2022, triplet: x64-windows },
            { image: macos-15-intel, triplet: x64-osx },
            { image: macos-latest, triplet: arm64-osx },
          ]
        standalone: [false, true]
        float_dtype_32: [false, true]
        python-version: ["${{ needs.get_python_versions.outputs.max-python }}"]
        include:
          - os: { image: ubuntu-24.04, triplet: x64-linux }
            standalone: false
            python-version: "${{ needs.get_python_versions.outputs.min-python }}"
            float_dtype_32: false
          - os: { image: ubuntu-24.04, triplet: x64-linux }
            standalone: true
            python-version: "${{ needs.get_python_versions.outputs.min-python }}"
            float_dtype_32: false

    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Fetch tags from main respository
        run: |
          git remote add upstream https://github.com/brian-team/brian2 && \
          git fetch --tags --force upstream
      - name: Install GSL
        uses: johnwason/vcpkg-action@ff71808de10afc0e3160fd079353c69ba0d7dd60 # v7.0.0
        id: vcpkg
        with:
          pkgs: gsl
          triplet: ${{ matrix.os.triplet }}
          cache-key: gsl-${{ matrix.os.triplet }}
          revision: master
          token: ${{ github.token }}
      - name: Set GSL preference for vcpkg
        shell: bash
        run: |
          mkdir ~/.brian/
          # Replaces backslashes with forward slashes
          echo "GSL.directory=\"${{ github.workspace }}\\vcpkg\\installed\\${{ matrix.os.triplet }}\\include\"" | tr '\\' '/' > ~/.brian/user_preferences
          cat ~/.brian/user_preferences
      - name: Install Python
        id: python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          cache: "pip"
          python-version: ${{ matrix.python-version }}

      # On Windows, set up MSVC dev environment (cl.exe + link.exe on PATH)
      # BEFORE we try to pip install CPyCppyy (which compiles C++ from source).
      # The ilammy/msvc-dev-cmd action is the canonical way to do this on
      # GitHub Actions; it locates vcvars64.bat via vswhere and sources it.
      # Used only on Windows. Action outputs are referenced via the env.
      - name: Set up MSVC dev command prompt (Windows only)
        if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: amd64

      - name: Install Brian2 and dependencies
        env:
          PYTHON_BINARY: ${{ steps.python.outputs.python-path }}
        run: |
          "$PYTHON_BINARY" -m pip install .[test]

      - name: Install cppyy (Linux/macOS, runtime only)
        # Linux/macOS: simple one-shot install; cppyy-stack wheels are absent
        # so this builds from source but the build is healthy on gcc/clang.
        # standalone:true is skipped: cppyy is a runtime JIT backend only.
        # Soft-fail (|| echo) so a transient PyPI issue doesn't block CI.
        if: ${{ runner.os != 'Windows' && !matrix.standalone }}
        env:
          PYTHON_BINARY: ${{ steps.python.outputs.python-path }}
        run: |
          "$PYTHON_BINARY" -m pip install "cppyy>=3.1" || echo "cppyy install failed, skipping"

      - name: Install cppyy (Windows, runtime only, with upstream workaround)
        # On Windows the simple `pip install cppyy>=3.1` fails with LNK2001
        # (missing symbol Cppyy::GetNumBasesLongestBranch) — an ABI mismatch
        # between cppyy-backend-1.15.3 (.lib pre-built) and CPyCppyy-1.13.0
        # (built from source). Tracked upstream as wlav/cppyy#282 (open).
        #
        # The cppyy maintainer (wlav) and two independent users confirmed a
        # workaround: install each stack layer with --no-deps --no-build-isolation
        # --force-reinstall. PEP 517 build isolation reuses the older .lib from
        # the user's env when allowed; disabling isolation forces the linker to
        # see the freshly built cppyy-backend. last verified working 2025-04-23.
        #
        # Versions pinned to the exact ones from the issue #282 comment thread.
        # MSVC dev env was set up by ilammy/msvc-dev-cmd above so cl.exe /
        # link.exe are already on PATH for this step.
        # Soft-fail per layer so a future breakage doesn't block CI.
        if: ${{ runner.os == 'Windows' && !matrix.standalone }}
        env:
          PYTHON_BINARY: ${{ steps.python.outputs.python-path }}
        shell: cmd
        run: |
          echo ::group::Install cppyy stack on Windows (--no-build-isolation workaround)
          "%PYTHON_BINARY%" -m pip install --upgrade pip || echo "pip upgrade failed, continuing"
          rem Install from least-dependent to most so the linker sees fresh .lib.
          "%PYTHON_BINARY%" -m pip install ^
              cppyy-cling==6.32.8 ^
              --no-deps --no-build-isolation --force-reinstall || ^
              echo "cppyy-cling install failed, continuing"
          "%PYTHON_BINARY%" -m pip install ^
              cppyy-backend==1.15.3 ^
              --no-deps --no-build-isolation --force-reinstall || ^
              echo "cppyy-backend install failed, continuing"
          "%PYTHON_BINARY%" -m pip install ^
              CPyCppyy==1.13.0 ^
              --no-deps --no-build-isolation --force-reinstall || ^
              echo "CPyCppyy install failed, continuing"
          "%PYTHON_BINARY%" -m pip install ^
              cppyy==3.5.0 ^
              --no-deps --no-build-isolation --force-reinstall || ^
              echo "cppyy install failed, continuing without cppyy"
          echo ::endgroup::

      - name: Verify cppyy availability (Windows)
        # Independent verification so the CI log unambiguously says whether
        # cppyy was actually exercised by the tests below or silently skipped.
        # run_test_suite.py auto-detects cppyy via importlib.util.find_spec
        # and only adds it to the parallel target list when present.
        if: ${{ runner.os == 'Windows' && !matrix.standalone }}
        env:
          PYTHON_BINARY: ${{ steps.python.outputs.python-path }}
        shell: cmd
        run: |
          "%PYTHON_BINARY%" -c ^
              "import importlib.util; ok = importlib.util.find_spec('cppyy') is not None; ^
               print('CPPYY_AVAILABLE=' + ('1' if ok else '0'))" ^
              || echo "cppyy verification step failed, assuming not available"
          "%PYTHON_BINARY%" -c ^
              "import cppyy; print('cppyy imported successfully, version:', cppyy.__version__)" ^
              || echo "cppyy import failed at runtime (DLL load error?) — tests will skip cppyy"

      - name: Determine Cython cache dir
        id: cython-cache
        run: |
          cd  $GITHUB_WORKSPACE/.. # move out of the workspace to avoid direct import
          CACHE_DIR=$("$PYTHON_BINARY" -c 'from brian2.codegen.runtime.cython_rt.extension_manager import get_cython_cache_dir; print(get_cython_cache_dir())')
          echo "Cython cache dir: $CACHE_DIR"
          echo "cachedir=$CACHE_DIR" >> "$GITHUB_OUTPUT"
        env:
          PYTHON_BINARY: ${{ steps.python.outputs.python-path }}

      - name: restore Cython cache
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        if: ${{ ! matrix.standalone }}
        with:
          key: cython-extensions-${{ matrix.os.image }}-${{ matrix.python-version }}-32bit-${{ matrix.float_dtype_32 }}
          path: ${{ steps.cython-cache.outputs.cachedir }}

      - name: Run Tests
        run: |
          cd  $GITHUB_WORKSPACE/.. && \
          "$PYTHON_BINARY" $GITHUB_WORKSPACE/$SCRIPT_NAME && \
          cp coverage.xml $GITHUB_WORKSPACE/
        env:
          SCRIPT_NAME: dev/continuous-integration/run_test_suite.py
          SPHINX_DIR: ${{ github.workspace }}/docs_sphinx
          AGENT_OS: ${{runner.os}}
          STANDALONE: ${{ matrix.standalone }}
          FLOAT_DTYPE_32: ${{ matrix.float_dtype_32 }}
          PYTHON_BINARY: ${{ steps.python.outputs.python-path }}
          DO_NOT_RESET_PREFERENCES: true # Make sure that GSL setting is used
          # cppyy's libCling.so on macOS links against a MacPorts zstd path;
          # prepend both Homebrew locations (arm64 + Intel) so it resolves at runtime.
          DYLD_LIBRARY_PATH: "/opt/homebrew/opt/zstd/lib:/usr/local/opt/zstd/lib"
      - name: Send coverage to Coveralls (parallel)
        if: ${{ startsWith(matrix.os.image, 'ubuntu-') && matrix.python-version == needs.get_python_versions.outputs.max-python }}
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          parallel: true
          flag-name: run ${{ join(matrix.*, ' - ') }}

  coveralls:
    name: Indicate completion to coveralls.io
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - name: Close parallel build
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          parallel-finished: true

  test_doc_build:
    needs: get_python_versions
    name: Test building the documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true
      - name: Fetch tags from main respository
        run: |
          git remote add upstream https://github.com/brian-team/brian2 && \
          git fetch --tags --force upstream
      - name: Setup Conda and Python
        uses: conda-incubator/setup-miniconda@835234971496cad1653abb28a638a281cf32541f # v3.2.0
        with:
          conda-remove-defaults: true
          auto-update-conda: true
          auto-activate-base: false
          miniforge-version: latest
          activate-environment: "test_env"
          python-version: "${{ needs.get_python_versions.outputs.max-python }}"

      - name: Install dependencies
        run: pip install -r rtd-requirements.txt

      - name: Install brian2
        run: pip install .

      - name: Build HTML documentation
        run: |
          cd docs_sphinx
          sphinx-build -b html . ../docs
        env:
          READTHEDOCS: True
